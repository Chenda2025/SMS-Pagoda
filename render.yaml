services:
  - type: web
    name: sms-pagoda-backend
    runtime: python
    rootDir: school_management
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    disk:
      name: media-disk
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://sms-pagoda.onrender.com
      - key: MEDIA_ROOT
        value: /var/data/media
